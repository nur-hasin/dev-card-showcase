<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 ECHOES OF YOU · gentle reflections</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0ebe2;
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .echo-chamber {
      max-width: 1000px;
      width: 100%;
      background: #fffaf2;
      border-radius: 70px 70px 60px 60px;
      padding: 35px 35px 40px;
      box-shadow: 0 30px 45px -25px #a28e78, 0 10px 0 #dac9b5;
      border: 2px solid #ebd9c0;
    }

    /* header with soft light */
    .echo-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #fff2e0;
      border-radius: 100px;
      padding: 15px 30px 15px 35px;
      margin-bottom: 35px;
      border: 2px solid #ecd3b5;
      box-shadow: inset 0 2px 8px #fff5e6, 0 7px 0 #cbb59b;
    }

    .title-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .title-area h1 {
      font-size: 2.8rem;
      font-weight: 400;
      color: #7c5e48;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #f5e0c6;
    }

    .echo-counter {
      background: #dac9b5;
      border-radius: 60px;
      padding: 10px 30px;
      color: #4e3e30;
      font-weight: 500;
      font-size: 1.3rem;
      border: 2px solid #f8e2c8;
      box-shadow: inset 0 -3px 0 #b7a086;
    }

    /* main journal area */
    .journal-pane {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      margin-bottom: 35px;
    }

    /* writing side */
    .writing-desk {
      flex: 1;
      min-width: 300px;
      background: #fff6e8;
      border-radius: 60px;
      padding: 30px 25px;
      border: 3px solid #e7cfb2;
      box-shadow: inset 0 2px 10px #fff8e7, 0 12px 0 #cbb297;
    }

    .inkwell {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .inkwell label {
      color: #6b4f3b;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px dashed #dbbc92;
      padding-bottom: 12px;
    }

    #thoughtInput {
      background: #fffcf2;
      border: 3px solid #ddc2a2;
      border-radius: 50px;
      padding: 22px 25px;
      font-size: 1.3rem;
      font-family: 'Georgia', serif;
      color: #4a3a2c;
      resize: vertical;
      min-height: 180px;
      box-shadow: inset 0 4px 8px #f0dec9;
    }

    #thoughtInput:focus {
      outline: none;
      border-color: #c69c6d;
      background: #fffef9;
    }

    .pen-actions {
      display: flex;
      gap: 15px;
      margin-top: 15px;
    }

    .pen-btn {
      background: #e7cfb5;
      border: none;
      color: #4e3b2b;
      font-size: 1.3rem;
      padding: 16px 28px;
      border-radius: 60px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 6px 0 #b99e80;
      transition: 0.07s;
      border: 2px solid #f9e5cb;
      font-weight: 500;
    }

    .pen-btn:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #b99e80;
    }

    /* echoes side */
    .echo-wall {
      flex: 1;
      min-width: 300px;
      background: #fff6e8;
      border-radius: 60px;
      padding: 30px 25px;
      border: 3px solid #e7cfb2;
      box-shadow: inset 0 2px 10px #fff8e7, 0 12px 0 #cbb297;
    }

    .wall-header {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #6b4f3b;
      font-size: 1.6rem;
      border-bottom: 2px dashed #dbbc92;
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .echo-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .echo-card {
      background: #fffcf0;
      border-radius: 50px;
      padding: 22px 25px;
      border-left: 10px solid #e2c09e;
      box-shadow: 0 4px 0 #cbad8a;
      transition: 0.2s;
      word-break: break-word;
    }

    .echo-original {
      font-size: 1rem;
      color: #9b8875;
      margin-bottom: 8px;
      font-style: italic;
    }

    .echo-transformed {
      font-size: 1.4rem;
      color: #4f3c2b;
      line-height: 1.5;
      font-weight: 400;
    }

    .echo-meta {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #b39c84;
      display: flex;
      justify-content: space-between;
    }

    .empty-echo {
      color: #baa48f;
      font-size: 1.3rem;
      padding: 40px 25px;
      text-align: center;
      border: 2px dashed #d6bc9e;
      border-radius: 50px;
    }

    /* footer */
    .echo-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f2e3d2;
      border-radius: 70px;
      padding: 15px 30px;
      border: 2px solid #e1c9ae;
    }

    .mood-tag {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #6b4f3b;
    }

    .clear-btn {
      background: none;
      border: 2px solid #ccb294;
      color: #6b4f3b;
      font-size: 1.2rem;
      padding: 10px 25px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s;
      background: #faeada;
    }

    .clear-btn:hover {
      background: #e7d2ba;
    }
  </style>
</head>
<body>
  <div class="echo-chamber">
    <div class="echo-header">
      <div class="title-area">
        <h1>📓 ECHOES OF YOU</h1>
      </div>
      <div class="echo-counter" id="echoCounter">0 echoes</div>
    </div>

    <div class="journal-pane">
      <!-- writing desk -->
      <div class="writing-desk">
        <div class="inkwell">
          <label><span>✒️</span> your thought</label>
          <textarea id="thoughtInput" placeholder="write anything... a memory, a dream, a worry..."></textarea>
          <div class="pen-actions">
            <button class="pen-btn" id="echoBtn">🌀 send echo</button>
            <button class="pen-btn" id="randomBtn">✨ random seed</button>
          </div>
        </div>
      </div>

      <!-- echo wall -->
      <div class="echo-wall">
        <div class="wall-header">
          <span>🔮</span> returning echoes
        </div>
        <div class="echo-container" id="echoContainer">
          <div class="empty-echo">write a thought, then send it...</div>
        </div>
      </div>
    </div>

    <div class="echo-footer">
      <div class="mood-tag">
        <span>🕯️</span> gentle reflections
      </div>
      <button class="clear-btn" id="clearBtn">clear all echoes</button>
    </div>
  </div>

  <script>
    (function() {
      // echoes array
      let echoes = [];

      const thoughtInput = document.getElementById('thoughtInput');
      const echoBtn = document.getElementById('echoBtn');
      const randomBtn = document.getElementById('randomBtn');
      const clearBtn = document.getElementById('clearBtn');
      const echoContainer = document.getElementById('echoContainer');
      const echoCounter = document.getElementById('echoCounter');

      // poetic transformers
      function transformText(text) {
        if (!text.trim()) return '...silence...';

        // gentle transformations
        let transformed = text.trim();

        // random poetic alterations
        const replacements = [
          { from: /\b(I|me|my)\b/gi, to: 'one' },
          { from: /\b(you|your)\b/gi, to: 'the soul' },
          { from: /\b(like|as)\b/gi, to: 'as if' },
          { from: /\b(very)\b/gi, to: 'truly' },
          { from: /\b(sad|sorrow|hurt)\b/gi, to: 'soft ache' },
          { from: /\b(happy|joy|glad)\b/gi, to: 'quiet light' },
          { from: /\b(dream|dreaming)\b/gi, to: 'float' },
          { from: /\b(remember|memory)\b/gi, to: 'echo of' }
        ];

        replacements.forEach(r => {
          transformed = transformed.replace(r.from, r.to);
        });

        // add poetic flourish
        const endings = [
          '... as the day fades.',
          ', whispered softly.',
          '... drifting away.',
          ', like an old photograph.',
          '... carried by the wind.'
        ];
        const randomEnding = endings[Math.floor(Math.random() * endings.length)];

        // sometimes add at end
        if (Math.random() > 0.5) {
          transformed = transformed + randomEnding;
        } else {
          transformed = transformed.charAt(0).toLowerCase() + transformed.slice(1);
          transformed = '... ' + transformed;
        }

        return transformed;
      }

      // add echo
      function addEcho(original) {
        if (!original.trim()) return;

        const transformed = transformText(original);

        const echo = {
          id: 'echo_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
          original: original,
          transformed: transformed,
          timestamp: new Date().toLocaleTimeString().slice(0,5)
        };

        echoes.unshift(echo); // newest first
        if (echoes.length > 12) echoes.pop();

        renderEchoes();
        updateCounter();
      }

      function renderEchoes() {
        if (echoes.length === 0) {
          echoContainer.innerHTML = '<div class="empty-echo">write a thought, then send it...</div>';
          return;
        }

        let html = '';
        echoes.forEach(e => {
          html += `
            <div class="echo-card">
              <div class="echo-original">✎ ${e.original.substring(0, 60)}${e.original.length > 60 ? '…' : ''}</div>
              <div class="echo-transformed">${e.transformed}</div>
              <div class="echo-meta">
                <span>🕊️ ${e.timestamp}</span>
                <span>⚘</span>
              </div>
            </div>
          `;
        });
        echoContainer.innerHTML = html;
      }

      function updateCounter() {
        echoCounter.innerText = echoes.length + ' echo' + (echoes.length !== 1 ? 'es' : '');
      }

      // event listeners
      echoBtn.addEventListener('click', () => {
        addEcho(thoughtInput.value);
        thoughtInput.value = ''; // clear for next
      });

      randomBtn.addEventListener('click', () => {
        const prompts = [
          "I remember the smell of rain on dry earth.",
          "A dream where I was flying over mountains.",
          "The last time I saw the ocean.",
          "Someone I haven't spoken to in years.",
          "A song that makes me feel young.",
          "The shape of clouds today.",
          "A letter I never sent.",
          "Footsteps in the hallway at night.",
          "The first snowflake of winter.",
          "Laughter echoing in an empty room."
        ];
        const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];
        thoughtInput.value = randomPrompt;
      });

      clearBtn.addEventListener('click', () => {
        if (echoes.length > 0) {
          echoes = [];
          renderEchoes();
          updateCounter();
        }
      });

      // optional: enter key to send (but allow new lines with shift+enter)
      thoughtInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          addEcho(thoughtInput.value);
          thoughtInput.value = '';
        }
      });

      // initial demo echoes
      function initDemo() {
        echoes.push({
          id: 'demo1',
          original: 'I miss the way sunlight felt in that room.',
          transformed: 'the way sunlight felt... as the day fades.',
          timestamp: '14:23'
        });
        echoes.push({
          id: 'demo2',
          original: 'A dream about flying over mountains.',
          transformed: '... floating over mountains, carried by the wind.',
          timestamp: '09:47'
        });
        renderEchoes();
        updateCounter();
      }
      initDemo();
    })();
  </script>
</body>
</html>
