<!DOCTYPE html>
<html>
<head>
  <title>Mini Bluff Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

 <h1>Mini Bluff Game</h1>

<div class="ai-orb" id="orb"></div>

<div class="claim-box" id="aiClaim">
  AI Claim appears here...
</div>

<div class="controls">
  <button class="believe-btn" onclick="believe()">Believe</button>
  <button class="call-btn" onclick="callBluff()">Call Bluff</button>
</div>

<div class="stats">
  <div class="stat-box">Score<br><span id="score">0</span></div>
  <div class="stat-box">Trust<br><span id="trust">50</span></div>
  <div class="stat-box">Bluffs<br><span id="bluffs">0</span></div>
</div>

<button onclick="startGame()">Start</button>

</div>

<script src="script.js"></script>
</body>
</html>
