<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BrainBox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
    <h1>BrainBox</h1>
    <button onclick="showSection('game')">Reaction Game</button>
    <button onclick="showSection('quiz')">Quick Quiz</button>
    <button onclick="showSection('tool')">Password Generator</button>
</div>

<div id="game" class="section">
    <h2>Reaction Speed Test</h2>
    <div id="reactionBox">Wait for Green...</div>
    <p id="reactionResult"></p>
    <button onclick="startGame()">Start</button>
</div>

<div id="quiz" class="section">
    <h2>Quick Quiz</h2>
    <p id="question"></p>
    <div id="answers"></div>
    <p id="quizResult"></p>
    <button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="tool" class="section">
    <h2>Password Generator</h2>
    <input type="number" id="length" placeholder="Length">
    <button onclick="generatePassword()">Generate</button>
    <p id="passwordOutput"></p>
</div>

<script src="script.js"></script>
</body>
</html>
