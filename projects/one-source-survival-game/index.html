<!DOCTYPE html>
<html>
<head>
  <title>One Resource Survival</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>One Resource Survival</h1>
    <div class="stats">
      <div>Day: <span id="day">1</span></div>
      <div>Energy: <span id="energy">50</span></div>
      <div>Status: <span id="status">Stable</span></div>
    </div>
  </header>

  <div class="main">

    <div class="actions">
      <h2>Actions</h2>
      <button onclick="buildShelter()">Build Shelter (-15)</button>
      <button onclick="growFood()">Grow Food (-10)</button>
      <button onclick="explore()">Explore (-20)</button>
      <button onclick="rest()">Rest (+10)</button>
      <button onclick="nextDay()">Next Day</button>
    </div>

    <div class="log-section">
      <h2>Colony Log</h2>
      <div id="log"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
