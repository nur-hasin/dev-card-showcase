<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Castle · 3D Environment</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cinzel', 'Georgia', serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(30, 20, 15, 0.75);
            backdrop-filter: blur(8px);
            color: #f0dbb0;
            padding: 12px 28px;
            border-radius: 50px;
            border: 2px solid #b88a5a;
            pointer-events: none;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.6);
            font-size: 0.95rem;
        }
        #info span {
            color: #ffd966;
            font-weight: 600;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(20,15,10,0.5);
            backdrop-filter: blur(4px);
            color: #e5c8a3;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #8b6b45;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="info">
        🏰 <span>CASTLE ALDERIC</span> · medieval 3D scene · torchlight
    </div>
    <div id="controls-note">
        🖱️ drag to rotate · scroll to zoom
    </div>

    <!-- Import Three.js and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a3a55); // twilight sky
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(18, 10, 25);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // optional CSS2 renderer for labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 10;
        controls.maxDistance = 45;
        
        // --- lighting ---
        // ambient (moonlight)
        const ambient = new THREE.AmbientLight(0x404868);
        scene.add(ambient);
        
        // main directional light (sunset)
        const sunLight = new THREE.DirectionalLight(0xffccaa, 1.2);
        sunLight.position.set(10, 20, 15);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 25;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 40;
        scene.add(sunLight);
        
        // torch lights (point lights)
        const torchColors = [0xffaa66, 0xff8844, 0xff9966];
        for (let i = 0; i < 8; i++) {
            const light = new THREE.PointLight(torchColors[i % torchColors.length], 1.2, 20);
            light.position.set(
                (Math.random() - 0.5) * 15,
                3 + Math.random() * 5,
                (Math.random() - 0.5) * 15
            );
            scene.add(light);
        }
        
        // --- ground (grass) ---
        const groundGeo = new THREE.CircleGeometry(40, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x5a7a4a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- castle walls (simple blocks) ---
        function createWall(x, z, width, depth, height, color = 0xaa8866) {
            const geo = new THREE.BoxGeometry(width, height, depth);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, height/2 - 0.5, z);
            wall.castShadow = true;
            wall.receiveShadow = true;
            return wall;
        }
        
        // outer walls
        scene.add(createWall(0, -10, 20, 1, 4));
        scene.add(createWall(0, 10, 20, 1, 4));
        scene.add(createWall(-10, 0, 1, 20, 4));
        scene.add(createWall(10, 0, 1, 20, 4));
        
        // corner towers
        function createTower(x, z, color = 0xaa8866) {
            const group = new THREE.Group();
            const baseGeo = new THREE.CylinderGeometry(2, 2.5, 6, 8);
            const baseMat = new THREE.MeshStandardMaterial({ color: color });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = 2.5;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);
            
            const roofGeo = new THREE.ConeGeometry(1.8, 2, 8);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x884422 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = 5.5;
            roof.castShadow = true;
            group.add(roof);
            
            group.position.set(x, -0.5, z);
            return group;
        }
        
        scene.add(createTower(-10, -10));
        scene.add(createTower(10, -10));
        scene.add(createTower(-10, 10));
        scene.add(createTower(10, 10));
        
        // --- main keep (central building) ---
        const keepGroup = new THREE.Group();
        
        const keepBase = new THREE.Mesh(
            new THREE.BoxGeometry(6, 5, 6),
            new THREE.MeshStandardMaterial({ color: 0xaa8866 })
        );
        keepBase.position.y = 2;
        keepBase.castShadow = true;
        keepBase.receiveShadow = true;
        keepGroup.add(keepBase);
        
        const keepRoof = new THREE.Mesh(
            new THREE.ConeGeometry(4, 3, 4),
            new THREE.MeshStandardMaterial({ color: 0x884422 })
        );
        keepRoof.position.y = 5.5;
        keepRoof.castShadow = true;
        keepGroup.add(keepRoof);
        
        keepGroup.position.set(0, -0.5, 0);
        scene.add(keepGroup);
        
        // --- small houses (village inside) ---
        function createHouse(x, z) {
            const group = new THREE.Group();
            
            const base = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1.5, 2),
                new THREE.MeshStandardMaterial({ color: 0xccaa88 })
            );
            base.position.y = 0.25;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);
            
            const roof = new THREE.Mesh(
                new THREE.ConeGeometry(1.5, 1.2, 4),
                new THREE.MeshStandardMaterial({ color: 0xaa5533 })
            );
            roof.position.y = 1.4;
            roof.rotation.y = Math.PI/4;
            roof.castShadow = true;
            group.add(roof);
            
            group.position.set(x, -0.5, z);
            return group;
        }
        
        scene.add(createHouse(3, 3));
        scene.add(createHouse(-3, 4));
        scene.add(createHouse(4, -3));
        scene.add(createHouse(-4, -4));
        
        // --- trees (simple) ---
        function createTree(x, z) {
            const group = new THREE.Group();
            
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 2),
                new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
            );
            trunk.position.y = 0.5;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            const foliage = new THREE.Mesh(
                new THREE.ConeGeometry(0.8, 1.5, 6),
                new THREE.MeshStandardMaterial({ color: 0x2d5a27 })
            );
            foliage.position.y = 1.8;
            foliage.castShadow = true;
            group.add(foliage);
            
            group.position.set(x, -0.5, z);
            return group;
        }
        
        for (let i = 0; i < 12; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 14 + Math.random() * 6;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            scene.add(createTree(x, z));
        }
        
        // --- torches (floating lights) ---
        for (let i = 0; i < 8; i++) {
            const torchGroup = new THREE.Group();
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, 2),
                new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
            );
            pole.position.y = 0.5;
            torchGroup.add(pole);
            
            const flame = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 4),
                new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0x442200 })
            );
            flame.position.y = 1.6;
            torchGroup.add(flame);
            
            torchGroup.position.set(
                (Math.random() - 0.5) * 12,
                0,
                (Math.random() - 0.5) * 12
            );
            scene.add(torchGroup);
        }
        
        // --- flags on towers ---
        function createFlag(x, z) {
            const group = new THREE.Group();
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.05, 0.05, 2),
                new THREE.MeshStandardMaterial({ color: 0xcccccc })
            );
            pole.position.y = 7;
            group.add(pole);
            
            const flag = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.4, 0.05),
                new THREE.MeshStandardMaterial({ color: 0xaa4444 })
            );
            flag.position.set(0.4, 7.2, 0);
            group.add(flag);
            
            group.position.set(x, -0.5, z);
            return group;
        }
        
        scene.add(createFlag(-10, -10));
        scene.add(createFlag(10, -10));
        scene.add(createFlag(-10, 10));
        scene.add(createFlag(10, 10));
        
        // --- fog ---
        scene.fog = new THREE.FogExp2(0x2a3a55, 0.008);
        
        // --- stars (particles) ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 800;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i += 3) {
            starPos[i] = (Math.random() - 0.5) * 150;
            starPos[i+1] = (Math.random() - 0.5) * 80;
            starPos[i+2] = (Math.random() - 0.5) * 150;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            // rotate stars slowly
            stars.rotation.y += 0.0001;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // --- resize handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
