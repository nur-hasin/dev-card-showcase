<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChronoSense</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⏳ ChronoSense</h1>
<p>Test how accurately you can feel time passing!</p>

<div class="game-box">

<select id="level">
<option value="3000">Easy (3 sec)</option>
<option value="5000">Medium (5 sec)</option>
<option value="8000">Hard (8 sec)</option>
</select>

<button id="startBtn">Start</button>
<button id="stopBtn" disabled>Stop</button>

<div id="status">Press Start</div>

<div id="result"></div>

</div>

<h3>Attempt History</h3>
<ul id="history"></ul>

<script src="script.js"></script>

</body>
</html>
