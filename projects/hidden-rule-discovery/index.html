<!DOCTYPE html>
<html>
<head>
<title>RuleLab</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🧪 RuleLab</h1>
<p>Discover the hidden rule by testing numbers.</p>

<div class="container">

<input type="number" id="inputNumber" placeholder="Enter a number">
<button id="testBtn">Test Number</button>

<div id="result"></div>

<h3>Experiment Log</h3>
<ul id="log"></ul>

<input type="text" id="guessInput" placeholder="Guess the rule">
<button id="guessBtn">Submit Guess</button>

<div id="message"></div>

<button id="newGame">New Rule</button>

</div>

<script src="script.js"></script>

</body>
</html>
