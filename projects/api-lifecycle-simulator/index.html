<!DOCTYPE html>
<html>
<head>
    <title>API Lifecycle Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ Advanced API Lifecycle Simulator</h1>

<div class="request-panel">
    <select id="method">
        <option>GET</option>
        <option>POST</option>
        <option>PUT</option>
        <option>DELETE</option>
    </select>

    <input type="text" id="url" placeholder="/api/users">

    <textarea id="headers" placeholder="Authorization: Bearer token"></textarea>
    <textarea id="body" placeholder='{"name": "John"}'></textarea>

    <button id="sendRequest">Send API Request</button>
</div>

<canvas id="apiCanvas"></canvas>

<div class="log" id="log"></div>

<script src="script.js"></script>
</body>
</html>
