<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 BLOOM LOGIC · light garden</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4efe7;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .bloom-lab {
      max-width: 1300px;
      width: 100%;
      background: #fffcf5;
      border-radius: 70px 70px 60px 60px;
      padding: 30px 30px 35px;
      box-shadow: 0 30px 45px -20px #a58e7c, 0 8px 0 #dcd0c0;
      border: 2px solid #e8d9c5;
    }

    /* header with soft light */
    .bloom-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #fff3e0;
      border-radius: 100px;
      padding: 12px 30px 12px 35px;
      margin-bottom: 30px;
      border: 2px solid #eedbba;
      box-shadow: inset 0 2px 6px #fff8e7, 0 6px 0 #cebc9e;
    }

    .title-area {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .title-area h1 {
      font-size: 2.8rem;
      font-weight: 500;
      color: #6b4f3f;
      letter-spacing: 1.5px;
      text-shadow: 2px 2px 0 #ffe2b5;
    }

    .seed-counter {
      background: #b3a88e;
      border-radius: 60px;
      padding: 10px 30px;
      color: #fcf6e6;
      font-weight: 600;
      font-size: 1.4rem;
      border: 2px solid #fae1b0;
      box-shadow: inset 0 -3px 0 #8f8066;
    }

    /* main garden */
    .garden-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      margin-bottom: 30px;
    }

    /* logic canvas */
    .canvas-bed {
      flex: 3;
      min-width: 600px;
      background: #f1eadc;
      border-radius: 60px;
      padding: 15px;
      border: 3px solid #e0cbaa;
      box-shadow: inset 0 0 0 3px #fff9e6, 0 12px 0 #b7a07e;
    }

    #logicCanvas {
      display: block;
      width: 100%;
      height: auto;
      background: #fff9ec;
      border-radius: 50px;
      cursor: crosshair;
      border: 2px solid #d8c09b;
    }

    /* seed tray */
    .seed-tray {
      flex: 1;
      min-width: 260px;
      background: #f6ecdb;
      border-radius: 60px;
      padding: 25px 20px;
      border: 3px solid #e0cbaa;
      box-shadow: inset 0 2px 10px #fffae8, 0 10px 0 #b7a07e;
    }

    .tray-title {
      color: #6b4f3f;
      font-size: 1.8rem;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid #dabb92;
      padding-bottom: 12px;
    }

    .seed-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin-bottom: 35px;
    }

    .seed-card {
      background: #fff6e2;
      border-radius: 50px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border: 3px solid #dbbd92;
      box-shadow: 0 7px 0 #b3976e;
      cursor: pointer;
      transition: 0.07s;
      width: 110px;
    }

    .seed-card.active {
      background: #ffe6b3;
      border-color: #b38b5a;
      transform: scale(1.02);
      box-shadow: 0 0 0 3px #ffe9b6, 0 7px 0 #b3976e;
    }

    .seed-card:active {
      transform: translateY(7px);
      box-shadow: 0 1px 0 #b3976e;
    }

    .seed-emoji {
      font-size: 3rem;
      filter: drop-shadow(2px 4px 0 #dbb582);
    }

    .seed-name {
      color: #5a4a3a;
      font-weight: 600;
    }

    .seed-type {
      background: #e6d5b8;
      border-radius: 30px;
      padding: 4px 14px;
      color: #4e3f2f;
      font-size: 0.9rem;
    }

    /* logic controls */
    .logic-controls {
      background: #eeddc5;
      border-radius: 50px;
      padding: 20px;
      border: 2px solid #dbbc8c;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .garden-btn {
      background: #cbb593;
      border: none;
      color: #2f261c;
      font-size: 1.4rem;
      padding: 16px 20px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 6px 0 #9f886a;
      transition: 0.07s;
      border: 2px solid #f2dbb8;
      font-weight: 600;
    }

    .garden-btn:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #9f886a;
    }

    .garden-btn.light {
      background: #eed7af;
      box-shadow: 0 6px 0 #b99f7a;
    }

    /* truth garden */
    .truth-garden {
      background: #f4e7d3;
      border-radius: 60px;
      padding: 20px 25px;
      border: 3px solid #dbbc8c;
      box-shadow: inset 0 2px 8px #fff8e0, 0 8px 0 #b3976e;
    }

    .truth-header {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #5a4a3a;
      font-size: 1.5rem;
      margin-bottom: 15px;
    }

    .flowerbed {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      min-height: 80px;
    }

    .flower-chip {
      background: #f5e2c1;
      border-radius: 50px;
      padding: 14px 25px;
      display: flex;
      align-items: center;
      gap: 18px;
      border: 2px solid #c9a879;
      box-shadow: 0 4px 0 #ab8f68;
    }

    .flower-emoji {
      font-size: 2rem;
    }

    .flower-text {
      color: #4d3f2e;
      font-weight: 500;
    }

    .empty-garden {
      color: #ab947c;
      font-size: 1.3rem;
      padding: 25px 20px;
      border: 2px dashed #c9b08b;
      border-radius: 50px;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="bloom-lab">
    <div class="bloom-header">
      <div class="title-area">
        <h1>🌼 BLOOM LOGIC</h1>
      </div>
      <div class="seed-counter" id="seedCounter">0 seeds</div>
    </div>

    <div class="garden-grid">
      <!-- canvas for planting seeds -->
      <div class="canvas-bed">
        <canvas id="logicCanvas" width="800" height="450"></canvas>
      </div>

      <!-- seed tray & controls -->
      <div class="seed-tray">
        <div class="tray-title"><span>🌱</span> seed bank</div>
        <div class="seed-palette" id="seedPalette"></div>

        <div class="logic-controls">
          <div class="btn-group">
            <button class="garden-btn" id="evaluateBtn">🌸 bloom</button>
            <button class="garden-btn light" id="clearBtn">🍂 clear</button>
            <button class="garden-btn" id="randomBtn">🌀 randomize</button>
          </div>
        </div>
      </div>
    </div>

    <!-- truth garden: results -->
    <div class="truth-garden">
      <div class="truth-header">
        <span>✨</span> bloom results
      </div>
      <div class="flowerbed" id="flowerContainer">
        <div class="empty-garden">🌿 plant seeds and watch them bloom</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // seed types (logic gates)
      const seedTypes = [
        { emoji: '🌿', name: 'leaf', logic: 'AND', color: '#b0d3b0' },
        { emoji: '🌸', name: 'flower', logic: 'OR', color: '#f9b5b5' },
        { emoji: '🍄', name: 'mushroom', logic: 'XOR', color: '#d6b596' },
        { emoji: '🌞', name: 'sun', logic: 'NOT', color: '#f9e66b' },
        { emoji: '🌙', name: 'moon', logic: 'NAND', color: '#c2c1a5' },
        { emoji: '⭐', name: 'star', logic: 'NOR', color: '#ecd59c' }
      ];

      let currentSeedIndex = 0; // default leaf
      let seeds = []; // { x, y, typeIndex, id, value (0/1) }

      const canvas = document.getElementById('logicCanvas');
      const ctx = canvas.getContext('2d');
      const seedPalette = document.getElementById('seedPalette');
      const seedCounter = document.getElementById('seedCounter');
      const flowerContainer = document.getElementById('flowerContainer');
      const evaluateBtn = document.getElementById('evaluateBtn');
      const clearBtn = document.getElementById('clearBtn');
      const randomBtn = document.getElementById('randomBtn');

      let width = canvas.width;
      let height = canvas.height;

      // render seed palette
      function renderPalette() {
        let html = '';
        seedTypes.forEach((seed, idx) => {
          html += `
            <div class="seed-card ${idx === currentSeedIndex ? 'active' : ''}" data-index="${idx}">
              <span class="seed-emoji">${seed.emoji}</span>
              <span class="seed-name">${seed.name}</span>
              <span class="seed-type">${seed.logic}</span>
            </div>
          `;
        });
        seedPalette.innerHTML = html;

        document.querySelectorAll('.seed-card').forEach(card => {
          card.addEventListener('click', () => {
            document.querySelectorAll('.seed-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            currentSeedIndex = parseInt(card.dataset.index, 10);
          });
        });
      }

      // draw garden
      function drawGarden() {
        ctx.clearRect(0, 0, width, height);

        // soft grid
        ctx.strokeStyle = '#e8d9c5';
        ctx.lineWidth = 1;
        for (let i = 0; i < width; i += 40) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, height);
          ctx.strokeStyle = '#eadac2';
          ctx.stroke();
        }
        for (let i = 0; i < height; i += 40) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(width, i);
          ctx.strokeStyle = '#eadac2';
          ctx.stroke();
        }

        // draw seeds
        seeds.forEach(seed => {
          const type = seedTypes[seed.typeIndex];
          ctx.font = '40px "Segoe UI Emoji", "Apple Color Emoji"';
          ctx.fillStyle = '#4d3f2e';
          ctx.fillText(type.emoji, seed.x - 20, seed.y - 10);

          // draw connection nodes (small dots for logic)
          ctx.beginPath();
          ctx.arc(seed.x, seed.y + 15, 8, 0, 2 * Math.PI);
          ctx.fillStyle = seed.value ? '#8fc97f' : '#c9a87c';
          ctx.shadowBlur = 8;
          ctx.shadowColor = '#b3926e';
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = '#6b4f3f';
          ctx.lineWidth = 2;
          ctx.stroke();

          // label
          ctx.font = '14px "Inter"';
          ctx.fillStyle = '#5a4a3a';
          ctx.fillText(type.logic, seed.x - 18, seed.y - 30);
        });
      }

      // add seed at click
      function addSeed(mx, my) {
        // check boundaries
        if (mx < 30 || mx > width - 30 || my < 40 || my > height - 40) return;

        // avoid overlapping too close
        for (let s of seeds) {
          const dx = Math.abs(s.x - mx);
          const dy = Math.abs(s.y - my);
          if (dx < 40 && dy < 40) {
            flowerContainer.innerHTML = '<div class="flower-chip"><span class="flower-emoji">🌱</span><span class="flower-text">too close</span></div>';
            return;
          }
        }

        seeds.push({
          id: 'seed_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
          x: mx,
          y: my,
          typeIndex: currentSeedIndex,
          value: Math.random() < 0.5 ? 0 : 1 // random initial value
        });
        updateSeedCounter();
        drawGarden();
      }

      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;
        addSeed(mx, my);
      });

      function updateSeedCounter() {
        seedCounter.innerText = seeds.length + ' seed' + (seeds.length !== 1 ? 's' : '');
      }

      // evaluate logic (bloom)
      function evaluateBloom() {
        if (seeds.length === 0) {
          flowerContainer.innerHTML = '<div class="empty-garden">🌿 no seeds to bloom</div>';
          return;
        }

        // simulate simple logic: each seed's output depends on neighbors within 70px
        let results = [];
        seeds.forEach(seed => {
          const type = seedTypes[seed.typeIndex];
          // find neighbors
          const neighbors = seeds.filter(s => {
            if (s.id === seed.id) return false;
            const dx = s.x - seed.x;
            const dy = s.y - seed.y;
            return Math.sqrt(dx*dx + dy*dy) < 70;
          });

          let inputA = seed.value;
          let inputB = neighbors.length > 0 ? neighbors[0].value : 0;

          let output = 0;
          switch (type.logic) {
            case 'AND': output = inputA & inputB; break;
            case 'OR': output = inputA | inputB; break;
            case 'XOR': output = inputA ^ inputB; break;
            case 'NOT': output = inputA ? 0 : 1; break;
            case 'NAND': output = (inputA & inputB) ? 0 : 1; break;
            case 'NOR': output = (inputA | inputB) ? 0 : 1; break;
            default: output = 0;
          }

          results.push({
            emoji: type.emoji,
            name: type.name,
            output: output,
            logic: type.logic
          });

          // update seed value (for next bloom)
          seed.value = output;
        });

        // render flowerbed
        let html = '';
        results.slice(0, 8).forEach(r => {
          html += `
            <div class="flower-chip">
              <span class="flower-emoji">${r.emoji}</span>
              <span class="flower-text">${r.logic} = ${r.output}</span>
            </div>
          `;
        });
        flowerContainer.innerHTML = html;
        drawGarden();
      }

      // clear all seeds
      clearBtn.addEventListener('click', () => {
        seeds = [];
        drawGarden();
        updateSeedCounter();
        flowerContainer.innerHTML = '<div class="empty-garden">🌿 garden cleared</div>';
      });

      // randomize values
      randomBtn.addEventListener('click', () => {
        seeds.forEach(s => s.value = Math.random() < 0.5 ? 0 : 1);
        drawGarden();
        flowerContainer.innerHTML = '<div class="empty-garden">✨ values randomized</div>';
      });

      evaluateBtn.addEventListener('click', evaluateBloom);

      // init
      renderPalette();

      // demo seeds
      function initDemo() {
        seeds.push({ id: 'd1', x: 200, y: 200, typeIndex: 0, value: 1 });
        seeds.push({ id: 'd2', x: 300, y: 200, typeIndex: 1, value: 0 });
        seeds.push({ id: 'd3', x: 250, y: 300, typeIndex: 2, value: 1 });
        drawGarden();
        updateSeedCounter();
      }
      initDemo();
    })();
  </script>
</body>
</html>
