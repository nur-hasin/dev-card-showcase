<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Truth or Dare Ultimate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🎯 Truth or Dare</h1>
    <p>Choose wisely 😏</p>

    <div class="top-controls">
      <button onclick="toggleTheme()">🌙 Toggle Mode</button>
      <button onclick="resetGame()">🔄 Reset</button>
    </div>

    <div class="buttons">
      <button class="truth" onclick="generateTruth()">Truth</button>
      <button class="dare" onclick="generateDare()">Dare</button>
    </div>

    <div class="card" id="resultCard">
      Click a button to begin!
    </div>

    <div class="counter">
      Played: <span id="playCount">0</span>
    </div>

    <div class="add-section">
      <input type="text" id="customInput" placeholder="Add your own truth or dare..." />
      <div class="add-buttons">
        <button onclick="addTruth()">Add Truth</button>
        <button onclick="addDare()">Add Dare</button>
      </div>
    </div>

  </div>

  <audio id="clickSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
