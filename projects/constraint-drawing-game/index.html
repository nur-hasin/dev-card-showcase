<!DOCTYPE html>
<html>
<head>
<title>ConstrainSketch</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎨 ConstrainSketch</h1>

<div class="game-panel">

<div class="challenge-box">
<h3>Draw This:</h3>
<span id="object">House</span>

<h3>Constraint:</h3>
<span id="constraint">Only Straight Lines</span>
</div>

<canvas id="canvas" width="500" height="400"></canvas>

<div class="controls">
<button id="start">New Challenge</button>
<button id="clear">Clear</button>
</div>

<div id="timer">Time: 30</div>

</div>

<script src="script.js"></script>

</body>
</html>
