<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Deduction Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

<h1>🧠 Minimal Deduction Puzzle</h1>

<p class="subtitle">Deduce the hidden combination using logic.</p>

<div class="selectors">

<select id="shape">
<option value="">Shape</option>
<option>Circle</option>
<option>Square</option>
<option>Triangle</option>
</select>

<select id="color">
<option value="">Color</option>
<option>Red</option>
<option>Blue</option>
<option>Green</option>
</select>

<select id="number">
<option value="">Number</option>
<option>1</option>
<option>2</option>
<option>3</option>
</select>

</div>

<button id="guessBtn">Submit Guess</button>

<div class="feedback" id="feedback"></div>

<h3>Guess History</h3>

<ul id="history"></ul>

<button id="restart">Restart Puzzle</button>

</div>

<script src="script.js"></script>
</body>
</html>
