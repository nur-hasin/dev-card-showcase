<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cognitive Load Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">
    <h1>🧠 Cognitive Load Visualizer</h1>

    <div class="meter">
      <div class="meter-fill" id="meterFill"></div>
      <span class="threshold" id="thresholdLabel">Overload Threshold (70%)</span>
    </div>

    <p id="loadValue">Load: 0%</p>

    <!-- Settings Panel -->
    <div class="settings-panel">
      <button id="settingsToggle" class="settings-toggle">⚙️ Customize Zones</button>
      <div id="settingsContent" class="settings-content hidden">
        <h3>⚙️ Cognitive Load Settings</h3>
        
        <div class="setting-group">
          <label>Overload Threshold: <span id="thresholdValue">70</span>%</label>
          <input type="range" id="thresholdSlider" min="0" max="100" value="70" class="slider">
        </div>

        <div class="zones-config">
          <h4>Color Zones</h4>
          
          <div class="zone-config">
            <label>Optimal Zone (<span id="optimalMaxLabel">50</span>%)</label>
            <input type="range" id="optimalMax" min="0" max="100" value="50" class="slider zone-slider">
            <div class="color-preview" style="background: #22c55e"></div>
          </div>

          <div class="zone-config">
            <label>Moderate Zone (<span id="moderateMinLabel">50</span>% - <span id="moderateMaxLabel">70</span>%)</label>
            <input type="range" id="moderateMin" min="0" max="100" value="50" class="slider zone-slider">
            <input type="range" id="moderateMax" min="0" max="100" value="70" class="slider zone-slider">
            <div class="color-preview" style="background: #eab308"></div>
          </div>

          <div class="zone-config">
            <label>Overload Zone (> <span id="overloadMinLabel">70</span>%)</label>
            <input type="range" id="overloadMin" min="0" max="100" value="70" class="slider zone-slider">
            <div class="color-preview" style="background: #ef4444"></div>
          </div>
        </div>

        <div class="settings-actions">
          <button id="saveSettings" class="primary">Save Preferences</button>
          <button id="resetDefaults" class="secondary">Reset to Defaults</button>
        </div>
      </div>
    </div>

    <!-- Graph container -->
    <div class="graph-container">
      <canvas id="loadGraph" width="400" height="100"></canvas>
      <div class="graph-labels">
        <span>30s ago</span>
        <span>Now</span>
      </div>
    </div>

    <div class="controls">
      <button data-load="10" class="tooltip" data-tooltip="Quick email reply, low mental effort">Add Light Task (L)</button>
      <button data-load="20" class="tooltip" data-tooltip="Writing documentation, moderate focus">Add Medium Task (M)</button>
      <button data-load="30" class="tooltip" data-tooltip="Complex problem solving, high cognitive demand">Add Heavy Task (H)</button>
      <button id="interrupt" class="tooltip" data-tooltip="Sudden distraction with context switching penalty">Interrupt Task (I)</button>
      <button id="reset" class="secondary tooltip" data-tooltip="Reset cognitive load to zero">Reset (R)</button>
    </div>

    <p id="status">System stable</p>
    
    <div class="shortcuts-hint">
      <p>📱 Keyboard shortcuts: L (Light) | M (Medium) | H (Heavy) | I (Interrupt) | R (Reset)</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
