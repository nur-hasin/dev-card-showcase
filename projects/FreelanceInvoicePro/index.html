
<!DOCTYPE html>
<html>
<head>
    <title>Freelance Invoice Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Freelance Invoice Pro</h1>
        <div class="form-section">
            <input type="text" id="client" placeholder="Client Name">
            <input type="text" id="invoiceNumber" placeholder="Invoice Number">
            <input type="date" id="invoiceDate">
        </div>
        <div class="items-section">
            <input type="text" id="itemDesc" placeholder="Item Description">
            <input type="number" id="itemQty" placeholder="Qty">
            <input type="number" id="itemPrice" placeholder="Price">
            <button onclick="addItem()">Add Item</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody id="itemsTable"></tbody>
        </table>
        <div class="summary">
            <div>Subtotal: ₹ <span id="subtotal">0</span></div>
            <div>GST (18%): ₹ <span id="gst">0</span></div>
            <div class="grand">Grand Total: ₹ <span id="grandTotal">0</span></div>
        </div>
        <button class="print" onclick="generateInvoice()">Download / Print Invoice</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
