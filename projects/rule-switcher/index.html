<!DOCTYPE html>
<html>
<head>
  <title>Rule Switcher – Adaptive Logic Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="top-bar">
    <h1>Rule Switcher</h1>
    <div class="stats">
      <span>Score: <b id="score">0</b></span>
      <span>Time: <b id="time">60</b>s</span>
      <span>Focus: <b id="focus">100</b>%</span>
      <span>High: <b id="highScore">0</b></span>
    </div>
  </div>

  <div id="ruleDisplay" class="rule-display">
    Rule: EVEN numbers
  </div>

  <div id="grid" class="grid"></div>

  <div class="history">
    <h3>Rule History</h3>
    <ul id="ruleHistory"></ul>
  </div>

  <button id="startBtn">Start Game</button>

</div>

<script src="script.js"></script>
</body>
</html>
