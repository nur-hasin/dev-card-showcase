<!DOCTYPE html>
<html>
<head>
<title>ComplexityScope</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⚙️ ComplexityScope</h1>
<p>Visual Code Complexity Estimator</p>

<div class="container">

<textarea id="codeInput" placeholder="Paste your code here..."></textarea>

<button id="analyze">Analyze Code</button>

<div class="meter">
<div id="bar"></div>
</div>

<div id="level"></div>

<div class="stats">

<div class="card">
<h3>Loops</h3>
<p id="loops">0</p>
</div>

<div class="card">
<h3>Conditions</h3>
<p id="conds">0</p>
</div>

<div class="card">
<h3>Functions</h3>
<p id="funcs">0</p>
</div>

<div class="card">
<h3>Nesting Depth</h3>
<p id="depth">0</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
