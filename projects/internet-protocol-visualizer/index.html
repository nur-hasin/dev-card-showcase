<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internet Protocol Visualization Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌐 Internet Protocol Visualization Engine PRO</h1>

    <div class="controls">
        <button id="startBtn">Send Request</button>
        <label>
            Speed
            <input type="range" id="speedControl" min="0.5" max="3" step="0.5" value="1">
        </label>
        <label>
            <input type="checkbox" id="packetLoss">
            Simulate Packet Loss
        </label>
    </div>

    <canvas id="networkCanvas"></canvas>

    <div class="log" id="log"></div>

    <script src="script.js"></script>
</body>
</html>
