<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connections Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🧠 Connections</h1>
        <p>Select 4 words that belong together</p>
        <p id="mistakes">Mistakes Left: 4</p>

        <div id="grid" class="grid"></div>

        <button id="submitBtn">Submit Group</button>
        <button id="restartBtn" class="hidden">Play Again</button>

        <div id="message"></div>
    </div>

<script src="script.js"></script>
</body>
</html>
