<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rubik's Cube Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Rubik's Cube Game</h1>

<div class="scene">
<div class="cube" id="cube">

<!-- FRONT -->
<div class="face front">
<div class="cubie red"></div>
<div class="cubie red"></div>
<div class="cubie red"></div>

<div class="cubie red"></div>
<div class="cubie red"></div>
<div class="cubie red"></div>

<div class="cubie red"></div>
<div class="cubie red"></div>
<div class="cubie red"></div>
</div>

<!-- BACK -->
<div class="face back">
<div class="cubie orange"></div>
<div class="cubie orange"></div>
<div class="cubie orange"></div>

<div class="cubie orange"></div>
<div class="cubie orange"></div>
<div class="cubie orange"></div>

<div class="cubie orange"></div>
<div class="cubie orange"></div>
<div class="cubie orange"></div>
</div>

<!-- LEFT -->
<div class="face left">
<div class="cubie green"></div>
<div class="cubie green"></div>
<div class="cubie green"></div>

<div class="cubie green"></div>
<div class="cubie green"></div>
<div class="cubie green"></div>

<div class="cubie green"></div>
<div class="cubie green"></div>
<div class="cubie green"></div>
</div>

<!-- RIGHT -->
<div class="face right">
<div class="cubie blue"></div>
<div class="cubie blue"></div>
<div class="cubie blue"></div>

<div class="cubie blue"></div>
<div class="cubie blue"></div>
<div class="cubie blue"></div>

<div class="cubie blue"></div>
<div class="cubie blue"></div>
<div class="cubie blue"></div>
</div>

<!-- TOP -->
<div class="face top">
<div class="cubie white"></div>
<div class="cubie white"></div>
<div class="cubie white"></div>

<div class="cubie white"></div>
<div class="cubie white"></div>
<div class="cubie white"></div>

<div class="cubie white"></div>
<div class="cubie white"></div>
<div class="cubie white"></div>
</div>

<!-- BOTTOM -->
<div class="face bottom">
<div class="cubie yellow"></div>
<div class="cubie yellow"></div>
<div class="cubie yellow"></div>

<div class="cubie yellow"></div>
<div class="cubie yellow"></div>
<div class="cubie yellow"></div>

<div class="cubie yellow"></div>
<div class="cubie yellow"></div>
<div class="cubie yellow"></div>
</div>

</div>
</div>

<div class="controls">

<button onclick="rotateX()">Rotate X</button>
<button onclick="rotateY()">Rotate Y</button>
<button onclick="rotateZ()">Rotate Z</button>

<button onclick="shuffleCube()">Shuffle</button>
<button onclick="resetCube()">Reset</button>

</div>

<script src="script.js"></script>

</body>
</html>
