<!DOCTYPE html>
<html>
<head>
  <title>Memory Distortion – Reality Drift</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Reality Drift</h1>

  <div class="stats">
    <span>Level: <b id="level">1</b></span>
    <span>Score: <b id="score">0</b></span>
    <span>Focus: <b id="focus">3</b></span>
  </div>

  <div id="grid" class="grid"></div>

  <div class="controls">
    <button id="startBtn">Start</button>
    <button id="replayBtn">Replay Pattern (-1 Focus)</button>
    <button id="submitBtn">Submit Answer</button>
  </div>

  <div id="message"></div>

</div>

<script src="script.js"></script>
</body>
</html>
