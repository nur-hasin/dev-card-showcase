<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shape Sort Factory</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

<h1>🏭 Shape Sort Factory</h1>

<div class="stats">
Score: <span id="score">0</span> |
Lives: <span id="lives">3</span>
</div>

<div id="belt"></div>

<div class="machines">

<button data-shape="circle">⚪ Circle</button>
<button data-shape="square">⬜ Square</button>
<button data-shape="triangle">🔺 Triangle</button>
<button data-shape="star">⭐ Star</button>

</div>

<button id="start">Start Factory</button>

</div>

<script src="script.js"></script>
</body>
</html>
