<!DOCTYPE html>
<html>
<head>
    <title>CPU Scheduling Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚙ CPU Scheduling Algorithm Simulator</h1>

<div class="controls">
    <input type="number" id="arrival" placeholder="Arrival Time">
    <input type="number" id="burst" placeholder="Burst Time">
    <input type="number" id="priority" placeholder="Priority (optional)">
    <button id="addProcess">Add Process</button>

    <select id="algorithm">
        <option value="fcfs">FCFS</option>
        <option value="sjf">SJF</option>
        <option value="rr">Round Robin</option>
        <option value="priority">Priority</option>
    </select>

    <input type="number" id="quantum" placeholder="Time Quantum (RR)">
    <button id="runSimulation">Run</button>
</div>

<div class="queue-section">
    <h2>Process Queue</h2>
    <div id="processQueue"></div>
</div>

<div class="timeline-section">
    <h2>CPU Timeline (Gantt Chart)</h2>
    <canvas id="timelineCanvas"></canvas>
</div>

<div class="metrics-section">
    <h2>Metrics</h2>
    <div id="metrics"></div>
</div>

<script src="script.js"></script>
</body>
</html>
