<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mission Control Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

<h1>🚀 Mission Control</h1>

<div class="stats">
Time: <span id="time">60</span> |
Score: <span id="score">0</span>
</div>

<div class="panel">

<div id="puzzle"></div>

<input id="answer" placeholder="Enter answer">
<button id="submit">Submit</button>

</div>

<button id="start">Start Mission</button>

</div>

<script src="script.js"></script>

</body>
</html>
