<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinpoint Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎯 Pinpoint</h1>
        <p class="subtitle">Find the Common Category</p>

        <div id="attempts">Attempts Left: 3</div>

        <div id="wordGrid" class="word-grid"></div>

        <input type="text" id="guessInput" placeholder="Enter category name">
        <button id="submitBtn">Submit Guess</button>

        <div id="message"></div>
        <button id="restartBtn" class="hidden">Play Again</button>
    </div>

<script src="script.js"></script>
</body>
</html>
