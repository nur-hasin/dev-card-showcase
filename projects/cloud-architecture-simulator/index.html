<!DOCTYPE html>
<html>
<head>
    <title>Cloud Architecture Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>☁ Cloud Architecture Simulator</h1>

    <div class="controls">
        <button id="addServer">Add Server</button>
        <button id="addLB">Add Load Balancer</button>
        <button id="simulateTraffic">Simulate Traffic</button>
        <button id="triggerFailure">Trigger Server Failure</button>
    </div>

    <canvas id="cloudCanvas"></canvas>

    <div class="metrics">
        <div>Requests/sec: <span id="rps">0</span></div>
        <div>Active Servers: <span id="activeServers">0</span></div>
        <div>Failed Servers: <span id="failedServers">0</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
