<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Ladder Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🧩 Word Ladder</h1>

    <div class="words">
        <div class="word-box start">COLD</div>
        <div class="arrow">→</div>
        <div class="word-box target">WARM</div>
    </div>

    <p>Change one letter at a time to reach the target word.</p>

    <div id="ladder"></div>

    <input type="text" id="inputWord" placeholder="Enter next word">
    <button id="submitBtn">Submit</button>
    <button id="restartBtn" class="hidden">Restart</button>

    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
