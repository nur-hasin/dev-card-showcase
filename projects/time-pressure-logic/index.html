<!DOCTYPE html>
<html>
<head>
  <title>Time Pressure Logic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">

  <h1>Time Pressure Logic</h1>

  <div class="rule-box">
    Rule: <span id="ruleText"></span>
  </div>

  <div class="timer">
    <div id="timerBar"></div>
  </div>

  <div class="options" id="options"></div>

  <div class="stats">
    Score: <span id="score">0</span>
    Combo: <span id="combo">0</span>
  </div>

  <button onclick="startGame()">Start Game</button>

</div>

<script src="script.js"></script>
</body>
</html>
