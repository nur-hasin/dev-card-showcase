<!DOCTYPE html>
<html>
<head>
    <title>Mini DevTools Inspector PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛠 Mini DevTools Inspector PRO</h1>

<div class="toolbar">
    <button id="inspectMode">Toggle Inspect Mode</button>
    <button id="paintMode">Toggle Paint Flashing</button>
</div>

<div class="layout">
    <div class="left-panel">
        <h2>Selected Element</h2>
        <div id="selectedElement">None</div>
    </div>

    <div class="right-panel">
        <h2>Styles</h2>
        <div id="styleInspector"></div>

        <h2>Box Model</h2>
        <div id="boxModel"></div>

        <h2>Performance Timeline</h2>
        <canvas id="perfCanvas"></canvas>
    </div>
</div>

<div id="highlightOverlay"></div>

<script src="script.js"></script>
</body>
</html>
