<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIGNAL LOST</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-vignette"></div>

  <div class="shell">
    <header class="hud">
      <div class="hud-left">
        <div class="sys-label">SYS://CIRCUIT</div>
        <div class="level-display">LEVEL <span id="levelNum">01</span></div>
      </div>
      <div class="hud-center">
        <div class="title-text">SIGNAL LOST</div>
      </div>
      <div class="hud-right">
        <div class="moves-label">MOVES</div>
        <div class="moves-display" id="movesDisplay">0</div>
      </div>
    </header>

    <div class="screen">
      <div class="board-wrap">
        <canvas id="sparkCanvas"></canvas>
        <div class="board" id="board"></div>
      </div>
    </div>

    <footer class="controls">
      <button class="ctrl" id="btnHint">[ HINT ]</button>
      <div class="status-msg" id="statusMsg">ROUTE THE SIGNAL TO THE RECEIVER</div>
      <button class="ctrl" id="btnReset">[ RESET ]</button>
    </footer>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <div class="overlay-glitch" id="overlayGlitch">SIGNAL LOCKED</div>
      <div class="overlay-sub" id="overlaySub"></div>
      <button class="overlay-btn" id="overlayBtn">NEXT LEVEL →</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
