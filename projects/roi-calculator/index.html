<!DOCTYPE html>
<html>
<head>
  <title>Micro Life ROI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Micro Life ROI Calculator</h1>

  <div class="input-section">
    <input type="text" id="activityName" placeholder="Activity name (e.g. Gym, Coding)">
    <input type="number" id="hoursPerWeek" placeholder="Hours per week">
    <input type="number" id="impactScore" placeholder="Impact score (1-10)">
    <button onclick="calculateROI()">Analyze</button>
  </div>

  <div class="result-section">
    <h2>Analysis</h2>
    <p>Yearly Hours: <span id="yearlyHours">-</span></p>
    <p>5-Year Investment: <span id="fiveYear">-</span></p>
    <p>Opportunity Cost (in days): <span id="opportunityCost">-</span></p>
    <p>ROI Rating: <span id="roiRating">-</span></p>

    <div class="bar-container">
      <div id="roiBar" class="roi-bar"></div>
    </div>
  </div>

  <div class="history-section">
    <h2>Saved Activities</h2>
    <ul id="historyList"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
