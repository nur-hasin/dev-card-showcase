<!DOCTYPE html>
<html>
<head>
  <title>Constraint Coding Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Constraint Coding Arena</h1>

  <div class="challenge-box">
    <h3 id="problemTitle">Problem</h3>
    <p id="problemDesc"></p>
    <p class="constraint">Constraint: <span id="constraintText"></span></p>
  </div>

  <textarea id="codeInput" placeholder="Write your JavaScript function here..."></textarea>

  <div class="controls">
    <button onclick="runCode()">Run</button>
    <button onclick="nextChallenge()">Next Challenge</button>
    <button onclick="useHint()">Use Hint (-5)</button>
  </div>

  <div class="results">
    <p>Score: <span id="score">0</span></p>
    <p>Streak: <span id="streak">0</span></p>
    <p id="feedback"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
