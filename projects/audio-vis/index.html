<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesthesia · Audio Visualizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0c14;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #e0eaff;
        }

        .synth-card {
            max-width: 1200px;
            width: 100%;
            background: #151e2a;
            border-radius: 60px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), 0 0 0 2px #4a6080 inset;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #4a6080;
            padding-bottom: 1rem;
        }

        .title h1 {
            font-size: 2.2rem;
            font-weight: 400;
            background: linear-gradient(135deg, #ffb7c5, #b7c5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title p {
            color: #9ab8d9;
            font-size: 0.9rem;
        }

        .canvas-container {
            background: #0f1420;
            border-radius: 40px;
            padding: 1rem;
            border: 2px solid #4a6080;
            margin-bottom: 2rem;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0a0f1a;
            border-radius: 24px;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .control-group {
            background: #1a212e;
            border-radius: 30px;
            padding: 1.2rem 1.5rem;
            border: 2px solid #4a6080;
        }

        .control-group h3 {
            color: #c0e0ff;
            font-weight: 400;
            margin-bottom: 1rem;
            font-size: 1rem;
            border-bottom: 1px solid #4a6080;
            padding-bottom: 0.5rem;
        }

        .slider-item {
            margin-bottom: 1rem;
        }

        .slider-item label {
            display: flex;
            justify-content: space-between;
            color: #9ab8d9;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .slider-item input {
            width: 100%;
        }

        .color-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .color-item label {
            flex: 1;
            color: #9ab8d9;
        }

        .color-item input[type="color"] {
            width: 60px;
            height: 40px;
            border: 2px solid #4a6080;
            border-radius: 20px;
            background: transparent;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn {
            background: #1a212e;
            border: 2px solid #5a7090;
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #d0e8ff;
            cursor: pointer;
            transition: 0.1s;
            flex: 1;
            min-width: 100px;
        }

        .btn:hover {
            background: #2a3442;
            border-color: #7a90b0;
        }

        .btn.primary {
            background: #3f6b9f;
            border-color: #3f6b9f;
            color: white;
        }

        .btn.warning {
            background: #9f4f6b;
            border-color: #9f4f6b;
        }

        .mode-bar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .mode-btn {
            background: #1a212e;
            border: 2px solid #4a6080;
            border-radius: 40px;
            padding: 0.6rem 1.8rem;
            cursor: pointer;
            color: #b0d0f0;
            transition: 0.1s;
            font-size: 0.9rem;
        }

        .mode-btn.active {
            background: #3f6b9f;
            border-color: #3f6b9f;
            color: white;
        }

        .frequency-bars {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 60px;
            margin-top: 1rem;
        }

        .bar {
            flex: 1;
            background: linear-gradient(to top, #4ecdc4, #ffe66d);
            border-radius: 4px 4px 0 0;
            transition: height 0.1s;
        }

        .footer {
            text-align: center;
            color: #7a90b0;
            margin-top: 2rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="synth-card">
        <div class="header">
            <div class="title">
                <h1>🎵 Synesthesia Sandbox</h1>
                <p>real-time audio visualizer</p>
            </div>
        </div>

        <!-- canvas -->
        <div class="canvas-container">
            <canvas id="visualizerCanvas" width="800" height="400"></canvas>
        </div>

        <!-- mode selector -->
        <div class="mode-bar">
            <button class="mode-btn active" id="modeWave">waveform</button>
            <button class="mode-btn" id="modeBars">frequency bars</button>
            <button class="mode-btn" id="modeParticles">particles</button>
            <button class="mode-btn" id="modeRing">ring</button>
        </div>

        <!-- frequency preview -->
        <div class="frequency-bars" id="freqPreview">
            <!-- filled via js -->
        </div>

        <!-- controls -->
        <div class="control-panel">
            <div class="control-group">
                <h3>🔊 audio</h3>
                <div class="button-group">
                    <button class="btn" id="startAudio">🎤 start mic</button>
                    <button class="btn warning" id="stopAudio">⏹️ stop</button>
                </div>
                <div style="margin-top: 1rem; color: #9ab8d9;">
                    <input type="file" id="audioFile" accept="audio/*" style="display: none;">
                    <button class="btn" id="uploadFile">📁 upload audio</button>
                </div>
            </div>

            <div class="control-group">
                <h3>🎨 colors</h3>
                <div class="color-item">
                    <label>primary</label>
                    <input type="color" id="color1" value="#ff6b6b">
                </div>
                <div class="color-item">
                    <label>secondary</label>
                    <input type="color" id="color2" value="#4ecdc4">
                </div>
                <div class="color-item">
                    <label>background</label>
                    <input type="color" id="bgColor" value="#0a0f1a">
                </div>
            </div>

            <div class="control-group">
                <h3>⚙️ effects</h3>
                <div class="slider-item">
                    <label>sensitivity <span id="sensitivityVal">1.0</span></label>
                    <input type="range" id="sensitivity" min="0.1" max="3.0" value="1.0" step="0.1">
                </div>
                <div class="slider-item">
                    <label>smoothing <span id="smoothingVal">0.5</span></label>
                    <input type="range" id="smoothing" min="0" max="1" value="0.5" step="0.05">
                </div>
                <div class="slider-item">
                    <label>rotation <span id="rotationVal">0</span></label>
                    <input type="range" id="rotation" min="0" max="360" value="0" step="5">
                </div>
            </div>
        </div>

        <div class="footer">
            ⚡ allow microphone access or upload an audio file
        </div>
    </div>

    <script>
        (function() {
            // canvas
            const canvas = document.getElementById('visualizerCanvas');
            const ctx = canvas.getContext('2d');
            const width = 800;
            const height = 400;

            // audio context
            let audioContext = null;
            let analyser = null;
            let source = null;
            let mediaStream = null;
            let audioBuffer = null;
            let isPlaying = false;

            // data arrays
            const frequencyData = new Uint8Array(128);
            const waveformData = new Uint8Array(256);

            // state
            let currentMode = 'wave';
            let sensitivity = 1.0;
            let smoothing = 0.5;
            let rotation = 0;
            let color1 = '#ff6b6b';
            let color2 = '#4ecdc4';
            let bgColor = '#0a0f1a';

            // DOM elements
            const modeWave = document.getElementById('modeWave');
            const modeBars = document.getElementById('modeBars');
            const modeParticles = document.getElementById('modeParticles');
            const modeRing = document.getElementById('modeRing');
            const startAudio = document.getElementById('startAudio');
            const stopAudio = document.getElementById('stopAudio');
            const uploadFile = document.getElementById('uploadFile');
            const audioFile = document.getElementById('audioFile');
            const sensitivitySlider = document.getElementById('sensitivity');
            const sensitivityVal = document.getElementById('sensitivityVal');
            const smoothingSlider = document.getElementById('smoothing');
            const smoothingVal = document.getElementById('smoothingVal');
            const rotationSlider = document.getElementById('rotation');
            const rotationVal = document.getElementById('rotationVal');
            const color1Input = document.getElementById('color1');
            const color2Input = document.getElementById('color2');
            const bgColorInput = document.getElementById('bgColor');
            const freqPreview = document.getElementById('freqPreview');

            // mode switching
            modeWave.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                modeWave.classList.add('active');
                currentMode = 'wave';
            });
            modeBars.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                modeBars.classList.add('active');
                currentMode = 'bars';
            });
            modeParticles.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                modeParticles.classList.add('active');
                currentMode = 'particles';
            });
            modeRing.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                modeRing.classList.add('active');
                currentMode = 'ring';
            });

            // start microphone
            startAudio.addEventListener('click', async () => {
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    analyser.smoothingTimeConstant = smoothing;
                    
                    source = audioContext.createMediaStreamSource(mediaStream);
                    source.connect(analyser);
                    
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }
                    
                    isPlaying = true;
                } catch (err) {
                    alert('microphone access denied');
                }
            });

            // stop audio
            stopAudio.addEventListener('click', () => {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                if (source) {
                    source.disconnect();
                }
                isPlaying = false;
            });

            // upload audio file
            uploadFile.addEventListener('click', () => {
                audioFile.click();
            });

            audioFile.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const arrayBuffer = await file.arrayBuffer();
                
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                
                if (source) {
                    source.disconnect();
                }
                
                source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = smoothing;
                
                source.connect(analyser);
                analyser.connect(audioContext.destination);
                
                source.start();
                isPlaying = true;
            });

            // update controls
            sensitivitySlider.addEventListener('input', () => {
                sensitivity = parseFloat(sensitivitySlider.value);
                sensitivityVal.innerText = sensitivity.toFixed(1);
            });

            smoothingSlider.addEventListener('input', () => {
                smoothing = parseFloat(smoothingSlider.value);
                smoothingVal.innerText = smoothing.toFixed(2);
                if (analyser) {
                    analyser.smoothingTimeConstant = smoothing;
                }
            });

            rotationSlider.addEventListener('input', () => {
                rotation = parseInt(rotationSlider.value);
                rotationVal.innerText = rotation;
            });

            color1Input.addEventListener('input', () => { color1 = color1Input.value; });
            color2Input.addEventListener('input', () => { color2 = color2Input.value; });
            bgColorInput.addEventListener('input', () => { bgColor = bgColorInput.value; });

            // draw functions
            function drawWave() {
                if (analyser && isPlaying) {
                    analyser.getByteTimeDomainData(waveformData);
                }

                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, width, height);

                ctx.beginPath();
                ctx.strokeStyle = color1;
                ctx.lineWidth = 2;

                const sliceWidth = width / waveformData.length;
                let x = 0;

                for (let i = 0; i < waveformData.length; i++) {
                    const v = waveformData[i] / 128.0;
                    const y = v * height / 2;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }

                ctx.stroke();

                // secondary wave
                ctx.beginPath();
                ctx.strokeStyle = color2;
                ctx.lineWidth = 1;

                x = 0;
                for (let i = 0; i < waveformData.length; i++) {
                    const v = (255 - waveformData[i]) / 128.0;
                    const y = v * height / 2;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }

                    x += sliceWidth;
                }
                ctx.stroke();
            }

            function drawBars() {
                if (analyser && isPlaying) {
                    analyser.getByteFrequencyData(frequencyData);
                }

                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, width, height);

                const barWidth = width / frequencyData.length * 2;
                let x = 0;

                for (let i = 0; i < frequencyData.length / 2; i++) {
                    const value = frequencyData[i] * sensitivity;
                    const barHeight = Math.min(height, value);

                    const gradient = ctx.createLinearGradient(0, height - barHeight, 0, height);
                    gradient.addColorStop(0, color1);
                    gradient.addColorStop(1, color2);

                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight);

                    x += barWidth;
                }
            }

            function drawParticles() {
                if (analyser && isPlaying) {
                    analyser.getByteFrequencyData(frequencyData);
                }

                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, width, height);

                const centerX = width / 2;
                const centerY = height / 2;
                const count = 50;

                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2 + rotation * Math.PI / 180;
                    const freqIndex = Math.floor(i * frequencyData.length / count);
                    const magnitude = frequencyData[freqIndex] * sensitivity / 255;

                    const radius = 50 + magnitude * 150;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    const size = 2 + magnitude * 10;

                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = i % 2 === 0 ? color1 : color2;
                    ctx.fill();
                }
            }

            function drawRing() {
                if (analyser && isPlaying) {
                    analyser.getByteFrequencyData(frequencyData);
                }

                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, width, height);

                const centerX = width / 2;
                const centerY = height / 2;
                const maxRadius = Math.min(width, height) * 0.3;

                ctx.lineWidth = 2;

                for (let i = 0; i < 64; i++) {
                    const angle = (i / 64) * Math.PI * 2 + rotation * Math.PI / 180;
                    const magnitude = frequencyData[i] * sensitivity / 255;

                    const innerRadius = maxRadius * 0.8;
                    const outerRadius = innerRadius + magnitude * 50;

                    const x1 = centerX + Math.cos(angle) * innerRadius;
                    const y1 = centerY + Math.sin(angle) * innerRadius;
                    const x2 = centerX + Math.cos(angle) * outerRadius;
                    const y2 = centerY + Math.sin(angle) * outerRadius;

                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = i % 2 === 0 ? color1 : color2;
                    ctx.stroke();
                }
            }

            // update frequency preview bars
            function updatePreview() {
                let html = '';
                for (let i = 0; i < 20; i++) {
                    const val = isPlaying && analyser ? frequencyData[i * 6] * sensitivity / 255 * 100 : 20;
                    html += `<div class="bar" style="height: ${val}px;"></div>`;
                }
                freqPreview.innerHTML = html;
            }

            // animation loop
            function animate() {
                requestAnimationFrame(animate);

                if (currentMode === 'wave') drawWave();
                else if (currentMode === 'bars') drawBars();
                else if (currentMode === 'particles') drawParticles();
                else if (currentMode === 'ring') drawRing();

                updatePreview();
            }

            // start animation
            animate();
        })();
    </script>
</body>
</html>
