<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reality Remix Camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero card">
      <div>
        <p class="issue">#5682</p>
        <h1>Reality Remix Camera</h1>
        <p>Remix your live camera feed into alternate universes with interactive story hotspots and mini-quests.</p>
      </div>
      <button id="startCameraBtn" class="btn primary"><i class="fa-solid fa-camera"></i> Start Camera</button>
    </header>

    <section class="stats-grid">
      <article class="stat card"><small>Selected World</small><h2 id="worldLabel">Cyberpunk City</h2></article>
      <article class="stat card"><small>Hotspots Found</small><h2 id="hotspotCount">0 / 3</h2></article>
      <article class="stat card"><small>Quest Progress</small><h2 id="questProgress">0 / 3</h2></article>
      <article class="stat card"><small>Recording</small><h2 id="recordingStatus">Idle</h2></article>
    </section>

    <section class="camera-layout">
      <article class="card camera-card">
        <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Remix View</h3>
        <div class="camera-stage" id="cameraStage">
          <video id="cameraVideo" autoplay playsinline muted></video>
          <canvas id="remixCanvas"></canvas>
          <div id="overlayTint" class="overlay-tint"></div>
          <button class="hotspot" id="hotspot1" style="top:18%;left:21%;">⚡</button>
          <button class="hotspot" id="hotspot2" style="top:50%;left:67%;">🧩</button>
          <button class="hotspot" id="hotspot3" style="top:72%;left:37%;">🔮</button>
        </div>
        <div class="stage-actions">
          <button id="captureFrameBtn" class="btn ghost"><i class="fa-solid fa-image"></i> Capture Image</button>
          <button id="recordClipBtn" class="btn"><i class="fa-solid fa-video"></i> Export 30s Clip</button>
          <button id="shareBtn" class="btn ghost"><i class="fa-solid fa-share-nodes"></i> Share</button>
        </div>
      </article>

      <article class="card sidebar">
        <h3><i class="fa-solid fa-earth-asia"></i> Remix Worlds</h3>
        <div class="worlds" id="worldsList">
          <button class="world-btn active" data-world="cyberpunk">🌆 Cyberpunk City</button>
          <button class="world-btn" data-world="empire">🏛️ Ancient Empire</button>
          <button class="world-btn" data-world="underwater">🌊 Underwater World</button>
        </div>

        <h3><i class="fa-solid fa-map-location-dot"></i> Mini-Quest</h3>
        <div id="questBox" class="quest-box"></div>

        <h3><i class="fa-solid fa-scroll"></i> Story Log</h3>
        <div id="storyLog" class="story-log"></div>
      </article>
    </section>
  </main>

  <a id="downloadLink" class="hidden-link" download></a>
  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
